<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CALC∞ — Advanced Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* আপনার আগের সব CSS এখানে আছে (একই রাখুন) */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #050810; --surface: rgba(8,12,30,0.95); --border: rgba(0,255,200,0.18);
  --accent: #00ffc8; --accent2: #7b61ff; --accent3: #ff6b9d;
  --text: #e0fff8; --muted: rgba(224,255,248,0.45);
}
body { background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Share Tech Mono', monospace; position: relative; }
/* ... বাকি CSS আপনার আগের কোড থেকে রাখুন (আমি স্পেস বাঁচাতে সংক্ষেপ করলাম) ... */
.btn { position:relative; overflow:hidden; height:52px; border-radius:11px; border:1px solid transparent; font-family:'Share Tech Mono',monospace; font-size:.88rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform .12s cubic-bezier(.34,1.56,.64,1), box-shadow .15s; user-select:none; }
.btn:active { transform:scale(.91); }
/* Ripple effect */
.btn .rpl { position:absolute; border-radius:50%; background:rgba(255,255,255,.14); transform:scale(0); animation:rpl .38s ease-out forwards; pointer-events:none; }
@keyframes rpl { to { transform:scale(5); opacity:0; } }
/* বাকি সব CSS আপনার আগের কোড অনুযায়ী রাখুন */
</style>
</head>
<body>
<div class="wrapper">
  <!-- আপনার আগের HTML একদম একই রাখুন (header, calc, tabs, display, memory, grids) -->
  <!-- শুধু শেষে script যোগ করবো -->

  <div class="foot">CALC∞ · Open Source · GitHub Pages</div>
</div>

<script>
// ==================== STATE ====================
let S = {
  display: '0',
  memory: 0,
  angle: 'DEG',
  mode: 0,
  firstNum: null,
  operator: null,
  waitNext: false,
  justCalc: false,
  expression: '',
  history: []
};

const $ = id => document.getElementById(id);

// ==================== DISPLAY ====================
function setScreen(val) {
  const sc = $('screen');
  let s = String(val);
  sc.classList.remove('sm','xs','err');
  if (s.length > 14) sc.classList.add('xs');
  else if (s.length > 10) sc.classList.add('sm');
  sc.textContent = s;
  S.display = s;
}

function setExpr(t) { $('expr').textContent = t || ''; }

function flashPop() {
  const sc = $('screen');
  sc.classList.remove('pop'); void sc.offsetWidth; sc.classList.add('pop');
  setTimeout(() => sc.classList.remove('pop'), 300);
}

// ==================== CORE CALCULATION ====================
function calculate(a, b, op) {
  a = parseFloat(a); b = parseFloat(b);
  switch(op) {
    case '+': return a + b;
    case '-': return a - b;
    case '*': return a * b;
    case '/': return b === 0 ? 'Error' : a / b;
    case '%': return a % b;
  }
  return b;
}

function press(key) {
  const screen = S.display;

  if ('0123456789.'.includes(key)) {
    if (S.waitNext || S.justCalc) {
      setScreen(key === '.' ? '0.' : key);
      S.waitNext = false;
      S.justCalc = false;
    } else {
      if (screen === '0' && key !== '.') setScreen(key);
      else if (!(key === '.' && screen.includes('.'))) setScreen(screen + key);
    }
  }
  else if (['+','-','*','/'].includes(key)) {
    if (S.operator && !S.waitNext) {
      const res = calculate(S.firstNum, screen, S.operator);
      setScreen(res);
    }
    S.firstNum = S.display;
    S.operator = key;
    S.waitNext = true;
    setExpr(S.firstNum + ' ' + key);
  }
  else if (key === '=') {
    if (S.operator) {
      let res = calculate(S.firstNum, screen, S.operator);
      setScreen(res);
      setExpr(S.firstNum + ' ' + S.operator + ' ' + screen + ' =');
      S.justCalc = true;
      S.operator = null;
      flashPop();
    }
  }
  else if (key === 'AC') {
    resetAll();
  }
  else if (key === 'BS') {
    if (S.justCalc) return;
    let str = screen;
    if (str.length <= 1) setScreen('0');
    else setScreen(str.slice(0, -1));
  }
  else if (key === 'SGN') {
    setScreen(-parseFloat(screen));
  }
  else if (key === '%') {
    setScreen(parseFloat(screen) / 100);
  }

  // Scientific functions
  else if (['sin','cos','tan','asin','acos','atan','log','ln','sqrt','cbrt','sq','cu','^','exp','abs'].includes(key)) {
    let num = parseFloat(screen);
    let res;
    switch(key) {
      case 'sin': res = Math.sin(toRad(num)); break;
      case 'cos': res = Math.cos(toRad(num)); break;
      case 'tan': res = Math.tan(toRad(num)); break;
      case 'asin': res = fromRad(Math.asin(num)); break;
      case 'acos': res = fromRad(Math.acos(num)); break;
      case 'atan': res = fromRad(Math.atan(num)); break;
      case 'log': res = Math.log10(num); break;
      case 'ln': res = Math.log(num); break;
      case 'sqrt': res = Math.sqrt(num); break;
      case 'cbrt': res = Math.cbrt(num); break;
      case 'sq': res = num * num; break;
      case 'cu': res = num * num * num; break;
      case '^': res = Math.pow(num, prompt('Power?') || 2); break; // সহজ করার জন্য
      case 'exp': res = Math.exp(num); break;
      case 'abs': res = Math.abs(num); break;
    }
    setScreen(res);
  }
  else if (key === 'PI') setScreen(Math.PI);
  else if (key === 'E') setScreen(Math.E);
}

// Memory
function mCmd(cmd) {
  const val = parseFloat(S.display);
  switch(cmd) {
    case 'ms': S.memory = val; break;
    case 'mr': setScreen(S.memory); break;
    case 'm+': S.memory += val; break;
    case 'm-': S.memory -= val; break;
    case 'mc': S.memory = 0; break;
  }
}

function resetAll() {
  S.firstNum = null;
  S.operator = null;
  S.waitNext = false;
  S.justCalc = false;
  setScreen('0');
  setExpr('');
}

// Angle
function toRad(x) { return S.angle === 'DEG' ? x * Math.PI / 180 : x; }
function fromRad(x) { return S.angle === 'DEG' ? x * 180 / Math.PI : x; }
function toggleAngle() {
  S.angle = S.angle === 'DEG' ? 'RAD' : 'DEG';
  $('angleLbl').textContent = S.angle;
}

// Mode switch
function switchMode(m) {
  S.mode = m;
  [0,1,2].forEach(i => $('t'+i).classList.toggle('active', i===m));
  $('sciPanel').classList.toggle('on', m===1);
  $('progPanel').classList.toggle('on', m===2);
  $('angleLbl').style.display = m===1 ? 'inline' : 'none';
  resetAll();
}

// Ripple effect
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', e => {
    const r = document.createElement('span');
    r.className = 'rpl';
    const rc = btn.getBoundingClientRect();
    const sz = Math.max(rc.width, rc.height);
    r.style.cssText = `width:\( {sz}px;height: \){sz}px;left:\( {e.clientX-rc.left-sz/2}px;top: \){e.clientY-rc.top-sz/2}px;`;
    btn.appendChild(r);
    setTimeout(() => r.remove(), 400);
  });
});

// Init
window.onload = () => {
  setScreen('0');
};
</script>
</body>
</html>
