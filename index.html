<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALC∞ — Advanced Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #050810;
            --surface: rgba(8, 12, 30, 0.95);
            --border: rgba(0, 255, 200, 0.18);
            --accent: #00ffc8;
            --accent2: #7b61ff;
            --accent3: #ff6b9d;
            --text: #e0fff8;
            --muted: rgba(224, 255, 248, 0.45);
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Share Tech Mono', monospace;
            color: var(--text);
            overflow-x: hidden;
        }

        /* ব্যাকগ্রাউন্ড গ্রিড ও গ্লো */
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(0, 255, 200, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .wrapper { width: 100%; max-width: 420px; padding: 15px; position: relative; z-index: 10; }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 {
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.8rem;
            letter-spacing: 0.3em; background: linear-gradient(135deg, #00ffc8, #7b61ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(0, 255, 200, 0.5));
        }
        .header p { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 5px; }

        /* ক্যালকুলেটর মেইন কন্টেইনার */
        .calc {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 24px; padding: 20px; backdrop-filter: blur(20px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        /* ট্যাব ডিজাইন */
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab {
            flex: 1; padding: 10px 5px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 200, 0.1); border-radius: 10px;
            color: var(--muted); font-size: 0.6rem; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-weight: bold;
        }
        .tab.active { background: rgba(0, 255, 200, 0.1); border-color: var(--accent); color: var(--accent); box-shadow: 0 0 15px rgba(0, 255, 200, 0.15); }

        /* ডিসপ্লে */
        .disp-box {
            background: rgba(0, 4, 14, 0.9); border: 1px solid rgba(0, 255, 200, 0.2);
            border-radius: 16px; padding: 15px; margin-bottom: 15px; position: relative;
        }
        .disp-label { font-size: 0.55rem; color: rgba(0, 255, 200, 0.4); position: absolute; top: 10px; left: 15px; }
        .angle-tag { font-size: 0.55rem; color: var(--accent2); position: absolute; top: 10px; right: 15px; border: 1px solid rgba(123, 97, 255, 0.3); padding: 2px 6px; border-radius: 4px; }
        
        .expr { font-size: 0.8rem; color: var(--muted); text-align: right; min-height: 20px; margin-top: 15px; word-break: break-all; }
        .screen {
            font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 700;
            color: var(--accent); text-align: right; text-shadow: 0 0 20px rgba(0, 255, 200, 0.6);
            min-height: 50px; overflow-x: auto; white-space: nowrap; margin-top: 5px;
        }

        /* মেমোরি বার */
        .mem-bar { display: flex; gap: 6px; margin-bottom: 15px; }
        .mbtn {
            flex: 1; padding: 6px; background: rgba(123, 97, 255, 0.08);
            border: 1px solid rgba(123, 97, 255, 0.2); border-radius: 8px;
            color: #c8b4ff; font-size: 0.6rem; cursor: pointer;
        }

        /* গ্রিড সেটিংস */
        .grid { display: grid; gap: 8px; }
        .g4 { grid-template-columns: repeat(4, 1fr); }
        .g5 { grid-template-columns: repeat(5, 1fr); }

        /* বাটন ডিজাইন */
        .btn {
            height: 54px; border-radius: 12px; border: 1px solid transparent;
            font-family: 'Share Tech Mono', monospace; font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.15s; user-select: none; color: var(--text);
        }
        .btn:active { transform: scale(0.92); }

        .n { background: rgba(18, 26, 55, 0.9); border-color: rgba(255, 255, 255, 0.05); }
        .op { background: rgba(0, 70, 70, 0.6); color: var(--accent); border-color: rgba(0, 255, 200, 0.2); }
        .fn { background: rgba(55, 18, 85, 0.7); color: #c8b4ff; font-size: 0.75rem; }
        .cl { background: rgba(170, 25, 55, 0.7); color: #ff9ab8; }
        .bk { background: rgba(90, 35, 15, 0.7); color: #ffaa78; }
        .eq { background: linear-gradient(135deg, #00ffc8, #009173); color: #001a12; font-weight: 900; font-size: 1.4rem; box-shadow: 0 0 20px rgba(0, 255, 200, 0.3); }

        /* প্যানেল কন্ট্রোল */
        .panel { display: none; }
        .panel.active { display: grid; }

        .foot { text-align: center; margin-top: 15px; font-size: 0.55rem; color: rgba(224, 255, 248, 0.15); letter-spacing: 0.2em; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <h1>CALC∞</h1>
        <p>Advanced Scientific Calculator</p>
    </div>

    <div class="calc">
        <div class="tabs">
            <button class="tab active" onclick="switchMode('std', this)">Standard</button>
            <button class="tab" onclick="switchMode('sci', this)">Scientific</button>
            <button class="tab" onclick="switchMode('prog', this)">Programmer</button>
        </div>

        <div class="disp-box">
            <span class="disp-label">CALC∞</span>
            <span id="angleMode" class="angle-tag" style="display:none">DEG</span>
            <div class="expr" id="expr"></div>
            <div class="screen" id="screen">0</div>
        </div>

        <div class="mem-bar">
            <button class="mbtn" onclick="memOp('MS')">MS</button>
            <button class="mbtn" onclick="memOp('MR')">MR</button>
            <button class="mbtn" onclick="memOp('M+')">M+</button>
            <button class="mbtn" onclick="memOp('M-')">M-</button>
            <button class="mbtn" onclick="memOp('MC')">MC</button>
        </div>

        <div id="std-grid" class="grid g4 panel active">
            <button class="btn cl" onclick="press('AC')">AC</button>
            <button class="btn bk" onclick="press('BS')">⌫</button>
            <button class="btn fn" onclick="press('+/-')">+/-</button>
            <button class="btn op" onclick="press('/')">÷</button>

            <button class="btn n" onclick="press('7')">7</button>
            <button class="btn n" onclick="press('8')">8</button>
            <button class="btn n" onclick="press('9')">9</button>
            <button class="btn op" onclick="press('*')">×</button>

            <button class="btn n" onclick="press('4')">4</button>
            <button class="btn n" onclick="press('5')">5</button>
            <button class="btn n" onclick="press('6')">6</button>
            <button class="btn op" onclick="press('-')">−</button>

            <button class="btn n" onclick="press('1')">1</button>
            <button class="btn n" onclick="press('2')">2</button>
            <button class="btn n" onclick="press('3')">3</button>
            <button class="btn op" onclick="press('+')">+</button>

            <button class="btn fn" onclick="press('%')">%</button>
            <button class="btn n" onclick="press('0')">0</button>
            <button class="btn n" onclick="press('.')">.</button>
            <button class="btn eq" onclick="press('=')">=</button>
        </div>

        <div id="sci-grid" class="grid g5 panel">
            <button class="btn fn" onclick="sci('sin')">sin</button>
            <button class="btn fn" onclick="sci('cos')">cos</button>
            <button class="btn fn" onclick="sci('tan')">tan</button>
            <button class="btn fn" onclick="sci('asin')">sin⁻¹</button>
            <button class="btn fn" onclick="sci('acos')">cos⁻¹</button>
            <button class="btn fn" onclick="sci('log')">log</button>
            <button class="btn fn" onclick="sci('ln')">ln</button>
            <button class="btn fn" onclick="sci('sqrt')">√</button>
            <button class="btn fn" onclick="sci('pow')">xʸ</button>
            <button class="btn fn" onclick="sci('abs')">|x|</button>
            <button class="btn n" onclick="press('PI')">π</button>
            <button class="btn n" onclick="press('E')">e</button>
            <button class="btn fn" onclick="sci('fact')">n!</button>
            <button class="btn op" onclick="press('(')">(</button>
            <button class="btn op" onclick="press(')')">)</button>
        </div>

        <div id="prog-grid" class="grid g4 panel">
            <button class="btn fn" onclick="base('BIN')">BIN</button>
            <button class="btn fn" onclick="base('OCT')">OCT</button>
            <button class="btn fn" onclick="base('HEX')">HEX</button>
            <button class="btn fn" onclick="base('DEC')">DEC</button>
            <button class="btn n" onclick="press('A')">A</button>
            <button class="btn n" onclick="press('B')">B</button>
            <button class="btn n" onclick="press('C')">C</button>
            <button class="btn n" onclick="press('D')">D</button>
            <button class="btn n" onclick="press('E')">E</button>
            <button class="btn n" onclick="press('F')">F</button>
            <button class="btn op" onclick="press('AND')">&</button>
            <button class="btn op" onclick="press('OR')">|</button>
        </div>
    </div>

    <div class="foot">CALC∞ · POWERED BY JAVASCRIPT · OPEN SOURCE</div>
</div>

<script>
    let display = document.getElementById('screen');
    let exprDisplay = document.getElementById('expr');
    let currentInput = '0';
    let fullExpression = '';
    let memory = 0;

    function updateScreen() {
        display.innerText = currentInput;
        exprDisplay.innerText = fullExpression;
    }

    function press(key) {
        if (key === 'AC') {
            currentInput = '0';
            fullExpression = '';
        } else if (key === 'BS') {
            currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : '0';
        } else if (key === '=') {
            try {
                let evalExpr = currentInput.replace('×', '*').replace('÷', '/').replace('π', Math.PI).replace('e', Math.E);
                fullExpression = currentInput + ' =';
                currentInput = eval(evalExpr).toString();
            } catch {
                currentInput = 'Error';
            }
        } else if (key === '+/-') {
            currentInput = (parseFloat(currentInput) * -1).toString();
        } else {
            if (currentInput === '0' && key !== '.') currentInput = key;
            else currentInput += key;
        }
        updateScreen();
    }

    function switchMode(mode, btn) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(mode + '-grid').classList.add('active');
        
        document.getElementById('angleMode').style.display = (mode === 'sci') ? 'inline' : 'none';
    }

    function sci(fn) {
        let val = parseFloat(currentInput);
        let res = 0;
        switch(fn) {
            case 'sin': res = Math.sin(val * Math.PI / 180); break;
            case 'cos': res = Math.cos(val * Math.PI / 180); break;
            case 'sqrt': res = Math.sqrt(val); break;
            case 'log': res = Math.log10(val); break;
        }
        currentInput = res.toString();
        updateScreen();
    }

    function memOp(op) {
        let val = parseFloat(currentInput);
        if (op === 'MS') memory = val;
        if (op === 'MR') currentInput = memory.toString();
        if (op === 'MC') memory = 0;
        if (op === 'M+') memory += val;
        if (op === 'M-') memory -= val;
        updateScreen();
    }
</script>

</body>
              </html>
