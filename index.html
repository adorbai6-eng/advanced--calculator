<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALC∞ — Pro Advanced Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #050810;
            --surface: rgba(8, 12, 30, 0.95);
            --border: rgba(0, 255, 200, 0.18);
            --accent: #00ffc8;
            --accent2: #7b61ff;
            --text: #e0fff8;
            --muted: rgba(224, 255, 248, 0.45);
        }
        body { background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Share Tech Mono', monospace; color: var(--text); }
        .wrapper { width: 100%; max-width: 420px; padding: 15px; z-index: 10; }
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; letter-spacing: 0.2em; background: linear-gradient(135deg, #00ffc8, #7b61ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 5px rgba(0,255,200,0.3)); }
        
        .calc { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 18px; backdrop-filter: blur(20px); box-shadow: 0 30px 60px rgba(0,0,0,0.7); }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab { flex: 1; padding: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 255, 200, 0.1); border-radius: 10px; color: var(--muted); font-size: 0.65rem; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .tab.active { background: rgba(0, 255, 200, 0.1); border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(0,255,200,0.2); }

        .disp-box { background: rgba(0, 4, 14, 0.9); border: 1px solid rgba(0, 255, 200, 0.2); border-radius: 16px; padding: 15px; margin-bottom: 15px; position: relative; overflow: hidden; }
        
        .disp-label { font-family: 'Orbitron', sans-serif; font-size: 0.55rem; color: var(--accent); position: absolute; top: 12px; left: 15px; opacity: 0.8; letter-spacing: 1px; }
        .angle-status { position: absolute; top: 10px; right: 12px; font-size: 0.55rem; color: var(--accent2); border: 1px solid var(--accent2); padding: 2px 6px; border-radius: 4px; cursor: pointer; background: rgba(123, 97, 255, 0.1); }
        
        .expr { font-size: 0.75rem; color: var(--muted); text-align: right; min-height: 20px; margin-top: 15px; letter-spacing: 1px; }
        .screen { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; color: var(--accent); text-align: right; text-shadow: 0 0 15px rgba(0, 255, 200, 0.5); min-height: 50px; overflow-x: auto; white-space: nowrap; }

        .mem-bar { display: flex; gap: 5px; margin-bottom: 12px; }
        .mbtn { flex: 1; padding: 7px; background: rgba(123, 97, 255, 0.1); border: 1px solid rgba(123, 97, 255, 0.2); border-radius: 6px; color: #c8b4ff; font-size: 0.55rem; cursor: pointer; transition: 0.2s; }
        .mbtn:hover { background: rgba(123, 97, 255, 0.2); border-color: var(--accent2); }

        .grid { display: grid; gap: 8px; grid-template-columns: repeat(4, 1fr); }
        .btn { height: 52px; border-radius: 12px; border: 1px solid transparent; font-family: inherit; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); transition: 0.1s; }
        .btn:active { transform: scale(0.92); filter: brightness(1.2); }
        
        .n { background: rgba(18, 26, 55, 0.9); border-color: rgba(255,255,255,0.05); }
        .op { background: rgba(0, 70, 70, 0.5); color: var(--accent); border-color: rgba(0, 255, 200, 0.1); }
        .fn { background: rgba(55, 18, 85, 0.6); color: #c8b4ff; font-size: 0.75rem; }
        .cl { background: rgba(170, 25, 55, 0.6); color: #ff9ab8; }
        .eq { background: linear-gradient(135deg, #00ffc8, #009173); color: #001a12; font-weight: bold; font-size: 1.2rem; box-shadow: 0 0 15px rgba(0, 255, 200, 0.2); }
        
        .extra-panel { display: grid; gap: 8px; grid-template-columns: repeat(5, 1fr); margin-bottom: 8px; transition: 0.3s; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header"><h1>CALC∞</h1><p>Advanced System</p></div>

    <div class="calc">
        <div class="tabs">
            <button class="tab active" onclick="setMode('std', this)">Standard</button>
            <button class="tab" onclick="setMode('sci', this)">Scientific</button>
            <button class="tab" onclick="setMode('prog', this)">Programmer</button>
        </div>

        <div class="disp-box">
            <span class="disp-label">CALC∞</span>
            <div class="angle-status" id="angleBtn" onclick="toggleAngle()">DEG</div>
            <div class="expr" id="expr"></div>
            <div class="screen" id="screen">0</div>
        </div>

        <div class="mem-bar">
            <button class="mbtn" onclick="mem('MS')">MS</button>
            <button class="mbtn" onclick="mem('MR')">MR</button>
            <button class="mbtn" onclick="mem('M+')">M+</button>
            <button class="mbtn" onclick="mem('M-')">M-</button>
            <button class="mbtn" onclick="mem('MC')">MC</button>
        </div>

        <div id="sci-btns" class="extra-panel hidden">
            <button class="btn fn" onclick="f('sin')">sin</button>
            <button class="btn fn" onclick="f('cos')">cos</button>
            <button class="btn fn" onclick="f('tan')">tan</button>
            <button class="btn fn" onclick="f('log')">log</button>
            <button class="btn fn" onclick="f('sqrt')">√</button>
        </div>

        <div id="prog-btns" class="extra-panel hidden">
            <button class="btn fn" onclick="press('A')">A</button>
            <button class="btn fn" onclick="press('B')">B</button>
            <button class="btn fn" onclick="press('C')">C</button>
            <button class="btn fn" onclick="press('D')">D</button>
            <button class="btn fn" onclick="press('E')">E</button>
        </div>

        <div class="grid">
            <button class="btn cl" onclick="press('AC')">AC</button>
            <button class="btn op" onclick="press('BS')">⌫</button>
            <button class="btn op" onclick="press('%')">%</button>
            <button class="btn op" onclick="press('/')">÷</button>

            <button class="btn n" onclick="press('7')">7</button>
            <button class="btn n" onclick="press('8')">8</button>
            <button class="btn n" onclick="press('9')">9</button>
            <button class="btn op" onclick="press('*')">×</button>

            <button class="btn n" onclick="press('4')">4</button>
            <button class="btn n" onclick="press('5')">5</button>
            <button class="btn n" onclick="press('6')">6</button>
            <button class="btn op" onclick="press('-')">−</button>

            <button class="btn n" onclick="press('1')">1</button>
            <button class="btn n" onclick="press('2')">2</button>
            <button class="btn n" onclick="press('3')">3</button>
            <button class="btn op" onclick="press('+')">+</button>

            <button class="btn n" onclick="press('0')">0</button>
            <button class="btn n" onclick="press('.')">.</button>
            
            <button class="btn fn" id="expBtn" onclick="f('exp')">exp</button>
            
            <button class="btn eq" onclick="press('=')">=</button>
        </div>
    </div>
</div>

<script>
    let cur = "0", 
        exp = "", 
        memory = 0, 
        mode = "DEG",
        lastResult = null,
        isNewInput = false;

    // New advanced calculator logic
    function update() {
        document.getElementById('screen').innerText = cur;
        document.getElementById('expr').innerText = exp || "";
    }

    // Operator mapping and sanitization
    function sanitizeExpression(str) {
        return str
            .replace(/×/g, '*')
            .replace(/÷/g, '/')
            .replace(/−/g, '-');
    }

    function isOperator(char) {
        return ['+', '-', '*', '/', '%'].includes(char);
    }

    function press(k) {
        const screen = document.getElementById('screen');
        
        if (k === 'AC') {
            cur = "0";
            exp = "";
            isNewInput = false;
        } 
        else if (k === 'BS') {
            if (isNewInput) return;
            cur = cur.length > 1 ? cur.slice(0, -1) : "0";
        } 
        else if (k === '=') {
            if (isNewInput) return;
            try {
                let expression = sanitizeExpression(cur);
                exp = cur + " =";
                
                let res = Function('"use strict";return (' + expression + ')')();
                
                if (isNaN(res) || !isFinite(res)) throw "Error";
                
                lastResult = res;
                cur = Number.isInteger(res) ? res.toString() : parseFloat(res.toFixed(8)).toString();
                isNewInput = true;
            } catch (e) {
                cur = "Error";
                exp = "";
                isNewInput = true;
            }
        } 
        else if (k === '%') {
            // Proper percent calculation like professional calculators
            let num = parseFloat(cur);
            if (!isNaN(num)) {
                cur = (num / 100).toString();
            }
        } 
        else {
            if (isNewInput && !isOperator(k)) {
                cur = (k === '.') ? "0." : k;
                isNewInput = false;
            } 
            else if (cur === "0" && k !== '.' && !isOperator(k)) {
                cur = k;
            } 
            else if (isOperator(k) && isOperator(cur.slice(-1))) {
                // Prevent double operators
                cur = cur.slice(0, -1) + k;
            } 
            else if (k === '.' && cur.includes('.')) {
                // Prevent multiple decimal points
                return;
            } 
            else {
                cur += k;
            }
        }
        update();
    }

    function f(type) {
        if (isNewInput && lastResult !== null) cur = lastResult.toString();
        
        let v = parseFloat(cur);
        if (isNaN(v)) return;

        let result;
        let displayFunc = type.toUpperCase();

        switch (type) {
            case 'sin':
                result = Math.sin(mode === 'DEG' ? v * Math.PI / 180 : v);
                exp = displayFunc + "(" + cur + ")";
                break;
            case 'cos':
                result = Math.cos(mode === 'DEG' ? v * Math.PI / 180 : v);
                exp = displayFunc + "(" + cur + ")";
                break;
            case 'tan':
                result = Math.tan(mode === 'DEG' ? v * Math.PI / 180 : v);
                exp = displayFunc + "(" + cur + ")";
                break;
            case 'log':
                result = Math.log10(v);
                exp = "log₁₀(" + cur + ")";
                break;
            case 'sqrt':
                result = Math.sqrt(v);
                exp = "√(" + cur + ")";
                break;
            case 'exp':
                // Advanced scientific notation support
                if (!cur.includes('e') && !cur.includes('*10^')) {
                    cur += "e";
                    update();
                    return;
                }
                return;
        }

        if (result !== undefined) {
            cur = Number.isInteger(result) ? result.toString() : parseFloat(result.toFixed(8)).toString();
            isNewInput = true;
        }
        update();
    }

    function setMode(m, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        
        document.getElementById('sci-btns').classList.toggle('hidden', m !== 'sci');
        document.getElementById('prog-btns').classList.toggle('hidden', m !== 'prog');
    }

    function toggleAngle() {
        mode = mode === 'DEG' ? 'RAD' : 'DEG';
        document.getElementById('angleBtn').innerText = mode;
    }

    function mem(op) {
        let v = parseFloat(cur);
        if (isNaN(v)) return;

        if (op === 'MS') {
            memory = v;
            exp = "M Stored";
        } else if (op === 'MR') {
            cur = memory.toString();
            isNewInput = true;
        } else if (op === 'MC') {
            memory = 0;
            exp = "M Cleared";
        } else if (op === 'M+') {
            memory += v;
            exp = "M+";
        } else if (op === 'M-') {
            memory -= v;
            exp = "M-";
        }
        update();
    }

    // Keyboard support (pro feature)
    document.addEventListener('keydown', function(e) {
        if (document.activeElement.tagName === "INPUT") return;
        
        if (e.key >= '0' && e.key <= '9') press(e.key);
        else if (e.key === '.') press('.');
        else if (e.key === '+') press('+');
        else if (e.key === '-') press('-');
        else if (e.key === '*') press('*');
        else if (e.key === '/') press('/');
        else if (e.key === 'Enter' || e.key === '=') press('=');
        else if (e.key === 'Backspace') press('BS');
        else if (e.key === 'Escape') press('AC');
        else if (e.key === '%') press('%');
    });

    // Initialize
    update();
</script>
</body>
</html>
